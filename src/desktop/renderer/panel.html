<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentGuard - 快速面板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
      color: #e2e8f0;
      overflow: hidden;
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.compact {
      height: 280px;
    }

    body.expanded {
      height: 520px;
    }

    /* 头部 */
    .panel-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f7fafc;
    }

    .title-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      color: #cbd5e0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 14px;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #f7fafc;
    }

    /* 内容区 */
    .panel-content {
      padding: 16px 18px;
      overflow-y: auto;
      height: calc(100% - 57px);
    }

    .panel-content::-webkit-scrollbar {
      width: 6px;
    }

    .panel-content::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }

    .panel-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    /* 简易模式 - 关键信息卡片 */
    .quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px;
      transition: all 0.2s;
    }

    .stat-card:hover {
      background: rgba(0, 0, 0, 0.35);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #f7fafc;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .stat-value .unit {
      font-size: 13px;
      font-weight: 400;
      color: #94a3b8;
    }

    .stat-value .trend {
      font-size: 12px;
      margin-left: 6px;
    }

    .trend.up {
      color: #fbbf24;
    }

    .trend.down {
      color: #6ee7b7;
    }

    /* Agent 状态摘要 */
    .agents-summary {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 13px;
    }

    .summary-row:not(:last-child) {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .agent-name-mini {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.running {
      background: #6ee7b7;
      box-shadow: 0 0 8px rgba(110, 231, 183, 0.5);
    }

    .status-dot.stopped {
      background: #64748b;
    }

    /* 展开/收起按钮 */
    .expand-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 11px;
      border-radius: 8px;
      color: #cbd5e0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .expand-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
      color: #f7fafc;
    }

    .expand-icon {
      transition: transform 0.3s;
      font-size: 12px;
    }

    body.expanded .expand-icon {
      transform: rotate(180deg);
    }

    /* 详细信息区域 */
    .details-section {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.expanded .details-section {
      max-height: 300px;
    }

    .section {
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Token 详情 */
    .token-details {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px;
    }

    .token-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 13px;
    }

    .token-row:not(:last-child) {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .token-label {
      color: #94a3b8;
    }

    .token-value {
      color: #f7fafc;
      font-weight: 600;
    }

    /* 告警信息 */
    .alert-box {
      background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .alert-box.critical {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .alert-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .alert-content {
      flex: 1;
    }

    .alert-title {
      font-weight: 600;
      color: #fbbf24;
      margin-bottom: 4px;
    }

    .alert-box.critical .alert-title {
      color: #fca5a5;
    }

    .alert-message {
      color: #cbd5e0;
      line-height: 1.5;
    }

    /* 快速操作按钮 */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 11px 14px;
      border-radius: 8px;
      color: #cbd5e0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 500;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
      color: #f7fafc;
      transform: translateY(-1px);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn.primary {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
    }

    .action-btn.primary:hover {
      background: rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.4);
      color: #c7d2fe;
    }

    /* 加载状态 */
    .loading {
      opacity: 0.5;
      pointer-events: none;
    }

    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card, .agents-summary, .alert-box {
      animation: fadeIn 0.3s ease-out forwards;
    }

    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.2s; }
  </style>
</head>
<body class="compact">
  <!-- 头部 -->
  <div class="panel-header">
    <div class="panel-title">
      ⚛️ AgentGuard
      <span class="title-badge" id="status-badge">运行中</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-refresh" title="刷新">🔄</button>
      <button class="icon-btn" onclick="window.close()" title="关闭">✕</button>
    </div>
  </div>

  <!-- 内容区 -->
  <div class="panel-content">
    <!-- 简易模式 - 关键指标 -->
    <div class="quick-stats">
      <div class="stat-card">
        <div class="stat-label">💰 今日消耗</div>
        <div class="stat-value">
          <span id="cost-today">$0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📊 本月消耗</div>
        <div class="stat-value">
          <span id="cost-month">$0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🤖 活跃Agent</div>
        <div class="stat-value">
          <span id="agent-count">0/0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🛡️ 安全评分</div>
        <div class="stat-value">
          <span id="score">--</span>
          <span class="unit">/100</span>
        </div>
      </div>
    </div>

    <!-- Agent 状态摘要 -->
    <div class="agents-summary" id="agents-summary">
      <div class="summary-row">
        <div class="agent-name-mini">
          <span class="status-dot running"></span>
          <span>Claude Code</span>
        </div>
        <span style="color: #6ee7b7; font-size: 12px;">运行中</span>
      </div>
      <div class="summary-row">
        <div class="agent-name-mini">
          <span class="status-dot running"></span>
          <span>Cursor IDE</span>
        </div>
        <span style="color: #6ee7b7; font-size: 12px;">运行中</span>
      </div>
      <div class="summary-row">
        <div class="agent-name-mini">
          <span class="status-dot stopped"></span>
          <span>OpenClaw</span>
        </div>
        <span style="color: #64748b; font-size: 12px;">已停止</span>
      </div>
    </div>

    <!-- 告警（如果有）-->
    <div id="alert-container"></div>

    <!-- 展开按钮 -->
    <button class="expand-btn" id="expand-btn">
      <span id="expand-text">查看详细信息</span>
      <span class="expand-icon">▼</span>
    </button>

    <!-- 详细信息区域（默认隐藏）-->
    <div class="details-section">
      <!-- Token 详细统计 -->
      <div class="section">
        <div class="section-title">💎 Token 详情</div>
        <div class="token-details" id="token-details">
          <div class="token-row">
            <span class="token-label">Claude Code (今日)</span>
            <span class="token-value" id="claude-today">$0.00</span>
          </div>
          <div class="token-row">
            <span class="token-label">Cursor (今日)</span>
            <span class="token-value" id="cursor-today">$0.00</span>
          </div>
          <div class="token-row">
            <span class="token-label">Claude Code (本月)</span>
            <span class="token-value" id="claude-month">$0.00</span>
          </div>
          <div class="token-row">
            <span class="token-label">Cursor (本月)</span>
            <span class="token-value" id="cursor-month">$0.00</span>
          </div>
        </div>
      </div>

      <!-- 快速操作 -->
      <div class="section">
        <div class="section-title">⚡ 快速操作</div>
        <div class="quick-actions">
          <button class="action-btn primary" id="btn-dashboard">
            🌐 Dashboard
          </button>
          <button class="action-btn" id="btn-scan">
            🔍 扫描
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let isExpanded = false;
    let currentData = null;

    // 切换展开/收起
    document.getElementById('expand-btn').addEventListener('click', () => {
      isExpanded = !isExpanded;
      document.body.className = isExpanded ? 'expanded' : 'compact';
      document.getElementById('expand-text').textContent = isExpanded ? '收起详细信息' : '查看详细信息';
    });

    // 刷新数据
    document.getElementById('btn-refresh').addEventListener('click', async () => {
      const btn = document.getElementById('btn-refresh');
      btn.style.opacity = '0.5';
      btn.style.pointerEvents = 'none';
      
      try {
        const data = await ipcRenderer.invoke('get-detailed-data');
        updateUI(data);
      } catch (error) {
        console.error('Refresh failed:', error);
      } finally {
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      }
    });

    // 打开 Dashboard
    document.getElementById('btn-dashboard').addEventListener('click', async () => {
      await ipcRenderer.invoke('open-external', 'http://localhost:3000');
    });

    // 快速扫描
    document.getElementById('btn-scan').addEventListener('click', async () => {
      const btn = document.getElementById('btn-scan');
      const originalText = btn.innerHTML;
      btn.innerHTML = '⏳ 扫描中...';
      btn.disabled = true;

      try {
        await ipcRenderer.invoke('trigger-scan');
        const data = await ipcRenderer.invoke('get-detailed-data');
        updateUI(data);
      } catch (error) {
        console.error('Scan failed:', error);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });

    // 更新界面
    function updateUI(data) {
      if (!data) return;

      // 更新关键指标
      document.getElementById('cost-today').textContent = `$${data.costs?.daily?.toFixed(2) || '0.00'}`;
      document.getElementById('cost-month').textContent = `$${data.costs?.monthly?.toFixed(2) || '0.00'}`;
      
      const activeCount = data.agents?.filter(a => a.status === 'running').length || 0;
      const totalCount = data.agents?.length || 0;
      document.getElementById('agent-count').textContent = `${activeCount}/${totalCount}`;
      document.getElementById('score').textContent = data.score || '--';

      // 更新状态徽章
      const badge = document.getElementById('status-badge');
      if (activeCount === 0) {
        badge.textContent = '离线';
        badge.style.background = 'rgba(100, 116, 139, 0.2)';
        badge.style.color = '#94a3b8';
      } else if (activeCount < totalCount) {
        badge.textContent = '部分运行';
        badge.style.background = 'rgba(251, 191, 36, 0.2)';
        badge.style.color = '#fbbf24';
      } else {
        badge.textContent = '运行中';
        badge.style.background = 'rgba(16, 185, 129, 0.2)';
        badge.style.color = '#6ee7b7';
      }

      // 更新 Agent 列表
      const summary = document.getElementById('agents-summary');
      summary.innerHTML = '';
      data.agents?.forEach(agent => {
        const row = document.createElement('div');
        row.className = 'summary-row';
        const isRunning = agent.status === 'running';
        row.innerHTML = `
          <div class="agent-name-mini">
            <span class="status-dot ${isRunning ? 'running' : 'stopped'}"></span>
            <span>${agent.name}</span>
          </div>
          <span style="color: ${isRunning ? '#6ee7b7' : '#64748b'}; font-size: 12px;">
            ${isRunning ? '运行中' : '已停止'}
          </span>
        `;
        summary.appendChild(row);
      });

      // 更新 Token 详情
      if (data.tokens) {
        // 这里需要根据实际数据结构调整
        document.getElementById('claude-today').textContent = `$${(data.costs?.daily * 0.6 || 0).toFixed(2)}`;
        document.getElementById('cursor-today').textContent = `$${(data.costs?.daily * 0.4 || 0).toFixed(2)}`;
        document.getElementById('claude-month').textContent = `$${(data.costs?.monthly * 0.6 || 0).toFixed(2)}`;
        document.getElementById('cursor-month').textContent = `$${(data.costs?.monthly * 0.4 || 0).toFixed(2)}`;
      }

      // 更新告警
      const alertContainer = document.getElementById('alert-container');
      alertContainer.innerHTML = '';
      if (data.alerts && data.alerts.length > 0) {
        data.alerts.forEach(alert => {
          if (alert.level !== 'info') {
            const alertBox = document.createElement('div');
            alertBox.className = `alert-box ${alert.level === 'critical' ? 'critical' : ''}`;
            alertBox.innerHTML = `
              <span class="alert-icon">${alert.level === 'critical' ? '🚨' : '⚠️'}</span>
              <div class="alert-content">
                <div class="alert-title">${alert.level === 'critical' ? '严重告警' : '警告'}</div>
                <div class="alert-message">${alert.message}</div>
              </div>
            `;
            alertContainer.appendChild(alertBox);
          }
        });
      }

      currentData = data;
    }

    // 监听数据更新
    ipcRenderer.on('data-update', (_, data) => {
      updateUI(data);
    });

    // 初始加载
    (async () => {
      try {
        const data = await ipcRenderer.invoke('get-detailed-data');
        updateUI(data);
      } catch (error) {
        console.error('Failed to load initial data:', error);
      }
    })();
  </script>
</body>
</html>
